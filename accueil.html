<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudySpace — Accueil</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F3EE; --surface: #fff; --surface2: #EDEAE3;
  --border: rgba(0,0,0,0.08); --border-md: rgba(0,0,0,0.14);
  --text: #18160F; --text2: #7A776E; --text3: #B0ADA6;
  --green: #2C5F2E; --green-light: #EAF2EA;
  --radius: 14px; --radius-sm: 9px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
nav { background: var(--surface); border-bottom: 1px solid var(--border); height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; position: sticky; top: 0; z-index: 50; }
.logo { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); text-decoration: none; }
.logo em { color: var(--green); font-style: normal; }
.nav-links { display: flex; gap: 4px; list-style: none; }
.nav-links a { font-size: 13px; color: var(--text2); text-decoration: none; padding: 6px 14px; border-radius: 99px; transition: background .15s; }
.nav-links a:hover { background: var(--surface2); color: var(--text); }
.nav-links a.on { background: var(--green-light); color: var(--green); font-weight: 500; }
.main { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem 5rem; }
.page-eyebrow { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: .5rem; }
.page-title { font-family: 'Playfair Display', serif; font-size: 34px; color: var(--text); letter-spacing: -.5px; margin-bottom: .4rem; }
.page-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
.week-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 2rem; flex-wrap: wrap; }
.week-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 99px; padding: 6px 16px; font-size: 13px; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; white-space: nowrap; }
.week-btn:hover { border-color: var(--border-md); color: var(--text); }
.week-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; }
.week-arrow { background: none; border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: var(--text2); transition: all .15s; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
.week-arrow:hover { border-color: var(--border-md); color: var(--text); }
.today-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--green-light); color: var(--green); font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; margin-bottom: 1.25rem; }
.today-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.week-label { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); margin-bottom: 1.5rem; }
.week-label span { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; color: var(--text3); margin-left: 8px; }
.edt-outer {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 2rem;
}
.edt-card {
  background: #FDFCF9;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: var(--radius);
  padding: 1.75rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.day-col { display: flex; flex-direction: column; gap: 8px; }
.day-header { text-align: center; padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 2px; }
.day-name { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; }
.day-name.today { color: var(--green); }
.day-date { font-size: 10px; color: var(--text3); opacity: .7; margin-top: 2px; }
.slot { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: .75rem; position: relative; overflow: hidden; }
.slot::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: currentColor; }
.slot-time { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 500; }
.slot-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
.slot-detail { font-size: 11px; color: var(--text2); margin-top: 3px; line-height: 1.4; }
.slot.sport { color: #2C5F2E; background: #F4FAF4; border-color: #C8E6C9; }
.slot.cm { color: #1B3A6B; background: #F0F4FB; border-color: #BBCFEE; }
.slot.td { color: #6B4F1B; background: #FBF7F0; border-color: #E8D5B0; }
.slot.stage { color: #1B5A5E; background: #F0FAFA; border-color: #B0DEDE; }
.day-empty { text-align: center; padding: 1.5rem .5rem; font-size: 12px; color: var(--text3); }
.ferie { text-align: center; padding: 1.25rem .5rem; font-size: 12px; color: var(--text3); background: var(--surface); border: 1px dashed var(--border-md); border-radius: var(--radius-sm); }
@media (max-width: 700px) {
  nav { padding: 0 1rem; }
  .main { padding: 1.5rem 1rem 4rem; }
  .edt-outer {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 2rem;
}
.edt-card {
  background: #FDFCF9;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: var(--radius);
  padding: 1.75rem;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.day-grid { grid-template-columns: 1fr; }
}

.exams-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  margin-bottom: 2rem;
}
.exams-title { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); margin-bottom: .4rem; }
.exams-sub { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; }
.exam-list { display: flex; flex-direction: column; gap: 10px; }
.exam-item {
  background: #FDFCF9;
  border: 1px solid rgba(0,0,0,0.06);
  border-radius: var(--radius-sm);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 1.25rem;
}
.exam-date-block { flex-shrink: 0; text-align: center; width: 56px; }
.exam-day { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--text); line-height: 1; }
.exam-month { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }
.exam-divider { width: 1px; height: 40px; background: var(--border); flex-shrink: 0; }
.exam-info { flex: 1; min-width: 0; }
.exam-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.exam-detail { font-size: 12px; color: var(--text2); }
.exam-right { text-align: right; flex-shrink: 0; }
.exam-time { font-size: 13px; font-weight: 500; color: var(--text); }
.exam-duration { font-size: 11px; color: var(--text3); margin-top: 2px; }
.exam-room { font-size: 11px; color: var(--text3); margin-top: 1px; }
</style>
</head>
<body>

<nav>
  <a class="logo" href="accueil.html">Study<em>Space</em></a>
  <ul class="nav-links">
    <li><a href="accueil.html" class="on">Accueil</a></li>
    <li><a href="#">S1</a></li>
    <li><a href="#">S2</a></li>
    <li><a href="S3.html">S3</a></li>
    <li><a href="index.html">S4</a></li>
    <li><a href="#">S5</a></li>
    <li><a href="#">S6</a></li>
  </ul>
</nav>

<div class="main">
  <div class="edt-outer">
  <div class="page-eyebrow">L2 Éducation et Motricité — Groupe 2</div>
  <h1 class="page-title">Emploi du temps</h1>
  <p class="page-sub">Semestre 4 — 2025-2026</p>

  <div id="today-banner"></div>
  <div class="edt-card">
    <div class="week-nav" id="week-nav"></div>
    <div class="week-label" id="week-label"></div>
    <div class="day-grid" id="day-grid"></div>
  </div>
</div>

<script>
// Cours de base (toutes les semaines sauf exception)
// Anglais : semaines 23 mars et 6 avril
// RI      : semaines 9 mars, 16 mars, 30 mars (PAS 23 mars, PAS 6 avril)

var BASE = [
  // Lundi
  [
    {time:'13h30 – 15h30', name:'TD FSH', detail:'L. Lebihan — Salle 303 Bat 336', type:'td'}
  ],
  // Mardi
  [
    {time:'10h00 – 11h30', name:'Spécialité — Judo', detail:'Dojo 325', type:'sport'},
    {time:'14h00 – 17h00', name:'Santé EPS', detail:'Amphi F1-452', type:'cm'}
  ],
  // Mercredi
  [
    {time:'10h00 – 12h00', name:'Polyvalence Basketball', detail:'Gymnase 325', type:'sport'},
    {time:'13h30 – 16h30', name:'TD IMS', detail:'J. Etcheverry — Salle 126 Bat 425', type:'td'}
  ],
  // Jeudi
  [
    {time:'14h00 – 15h30', name:'Spécialité — Judo', detail:'Dojo 325', type:'sport'}
  ],
  // Vendredi
  [
    {time:'08h00 – 12h00', name:'CPI', detail:'Collège', type:'stage'},
    {time:'14h00 – 17h00', name:'Course d\'orientation', detail:'Polyvalence 2', type:'sport'}
  ]
];

var ANGLAIS = {time:'08h15 – 09h45', name:'Anglais', detail:'E. Pillard — Salle 220 Bat 425', type:'td'};
var RI      = {time:'10h00 – 11h30', name:'Recherche intégrée', detail:'', type:'td'};

var WEEKS = [
  {
    label: '9 – 13 mars',
    dates: ['Lun. 9 mars','Mar. 10 mars','Mer. 11 mars','Jeu. 12 mars','Ven. 13 mars'],
    start: new Date(2026,2,9),
    anglais: false, ri: true, ferieL: false, ims: true, orientation: true
  },
  {
    label: '16 – 20 mars',
    dates: ['Lun. 16 mars','Mar. 17 mars','Mer. 18 mars','Jeu. 19 mars','Ven. 20 mars'],
    start: new Date(2026,2,16),
    anglais: false, ri: true, ferieL: false, ims: true, orientation: true
  },
  {
    label: '23 – 27 mars',
    dates: ['Lun. 23 mars','Mar. 24 mars','Mer. 25 mars','Jeu. 26 mars','Ven. 27 mars'],
    start: new Date(2026,2,23),
    anglais: true, ri: false, ferieL: false, ims: false, orientation: false
  },
  {
    label: '30 mars – 3 avr.',
    dates: ['Lun. 30 mars','Mar. 31 mars','Mer. 1 avr.','Jeu. 2 avr.','Ven. 3 avr.'],
    start: new Date(2026,2,30),
    anglais: false, ri: true, ferieL: false, ims: false, orientation: false
  },
  {
    label: '6 – 10 avr.',
    dates: ['Lun. 6 avr.','Mar. 7 avr.','Mer. 8 avr.','Jeu. 9 avr.','Ven. 10 avr.'],
    start: new Date(2026,3,6),
    anglais: true, ri: false, ferieL: true, ims: false, orientation: false
  }
];

var DAYS = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
var curWeek = 0;

function getWeekDays(w) {
  var days = BASE.map(function(d){ return d.slice(); });

  if (w.anglais) days[2].unshift(ANGLAIS);
  if (w.ri)      days[3].unshift(RI);

  // Supprimer IMS (mercredi) si terminé
  if (!w.ims) {
    days[2] = days[2].filter(function(s){ return s.name !== 'TD IMS'; });
  }
  // Supprimer Course d'orientation (vendredi) si terminée
  if (!w.orientation) {
    days[4] = days[4].filter(function(s){ return s.name !== "Course d'orientation"; });
  }

  return days;
}

function detectCurrentWeek() {
  var today = new Date(); today.setHours(0,0,0,0);
  for (var i=0; i<WEEKS.length; i++) {
    var end = new Date(WEEKS[i].start); end.setDate(end.getDate()+4); end.setHours(23,59,59);
    if (today >= WEEKS[i].start && today <= end) return i;
  }
  return today < WEEKS[0].start ? 0 : WEEKS.length-1;
}

function isTodayInWeek(i) {
  var today = new Date(); today.setHours(0,0,0,0);
  var end = new Date(WEEKS[i].start); end.setDate(end.getDate()+4); end.setHours(23,59,59);
  return today >= WEEKS[i].start && today <= end;
}

function getTodayDayIdx() {
  var d = new Date().getDay();
  if (d===0||d===6) return -1;
  return d-1;
}

function buildNav() {
  var nav = document.getElementById('week-nav');
  nav.innerHTML = '';
  var prev = document.createElement('button');
  prev.className='week-arrow'; prev.textContent='←';
  prev.onclick=function(){ if(curWeek>0){curWeek--;render();} };
  nav.appendChild(prev);
  WEEKS.forEach(function(w,i){
    var btn=document.createElement('button');
    btn.className='week-btn'+(i===curWeek?' active':'');
    btn.textContent=w.label;
    btn.onclick=(function(idx){return function(){curWeek=idx;render();};})(i);
    nav.appendChild(btn);
  });
  var next=document.createElement('button');
  next.className='week-arrow'; next.textContent='→';
  next.onclick=function(){ if(curWeek<WEEKS.length-1){curWeek++;render();} };
  nav.appendChild(next);
}

function render() {
  buildNav();
  var w = WEEKS[curWeek];
  var isCurrentWeek = isTodayInWeek(curWeek);
  var todayIdx = isCurrentWeek ? getTodayDayIdx() : -1;

  // Banner
  var banner = document.getElementById('today-banner');
  if (isCurrentWeek && todayIdx>=0) {
    var d = new Date();
    banner.innerHTML = '<div class="today-badge"><span class="today-dot"></span>Aujourd\'hui — '+d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})+'</div>';
  } else { banner.innerHTML=''; }

  // Label
  document.getElementById('week-label').innerHTML =
    'Semaine du '+w.label+(isCurrentWeek?'<span>En cours</span>':'');

  // Grid
  var days = getWeekDays(w);
  var grid = document.getElementById('day-grid');
  var html = '';

  DAYS.forEach(function(name,di){
    var isToday = (di===todayIdx);
    html += '<div class="day-col">';
    html += '<div class="day-header">';
    html += '<div class="day-name'+(isToday?' today':'')+'">'+name+'</div>';
    html += '<div class="day-date">'+w.dates[di]+'</div>';
    html += '</div>';

    if (di===0 && w.ferieL) {
      html += '<div class="ferie">Jour férié</div>';
    } else {
      var slots = days[di];
      if (!slots||!slots.length) {
        html += '<div class="day-empty">—</div>';
      } else {
        slots.forEach(function(s){
          html += '<div class="slot '+s.type+'">';
          html += '<div class="slot-time">'+s.time+'</div>';
          html += '<div class="slot-name">'+s.name+'</div>';
          if(s.detail) html += '<div class="slot-detail">'+s.detail+'</div>';
          html += '</div>';
        });
      }
    }
    html += '</div>';
  });

  grid.innerHTML = html;
}

curWeek = detectCurrentWeek();
render();
</script>
</body>
</html>
